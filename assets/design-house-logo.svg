  <rect class="win" x="560" y="90" width="14" height="14" />
  <rect class="win" x="580" y="90" width="14" height="14" />
  <text x="410" y="186" text-anchor="middle" class="name">DESIGN HOUSE</text>
  <text x="410" y="226" text-anchor="middle" class="tag">Creative Architecture Group</text>
