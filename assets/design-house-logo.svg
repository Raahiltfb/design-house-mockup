  <title id="title">Design House logo</title>
  <desc id="desc">Stylized roofline and text for Design House Creative Architecture Group.</desc>
  <defs>
    <style>
      .roof { fill: none; stroke: #8f7760; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; }
      .name { font-family: 'Georgia', serif; font-size: 66px; fill: #8f7760; letter-spacing: 3px; }
      .tag { font-family: 'Arial', sans-serif; font-size: 24px; fill: #b9a792; letter-spacing: 1px; }
      .win { fill: #8f7760; }
